# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy to Staging (swap to prod) - backfolio-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install node dependencies and build the Vite app
      - name: Install dependencies
        run: |
          npm ci

      - name: Build application
        run: |
          npm run build

      # Prepare deployment package with server files
      - name: Prepare deployment package
        run: |
          cp server.js dist/
          cp config.production.json dist/
          cp config.staging.json dist/
          cp package-server.json dist/package.json
          cd dist
          npm install --production

      # Upload the build for staging slot (will be swapped to production)
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist
          path: dist/
          retention-days: 7

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService
      

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    environment:
      name: staging
      url: https://backfolio-frontend-staging-brb5fjfdaufydfez.canadacentral-01.azurewebsites.net

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: webapp-dist
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Deploy to Azure Web App - Staging Slot'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'backfolio-frontend'
          slot-name: 'staging'
          package: '.'
          startup-command: 'node server.js'
        env:
          SCM_DO_BUILD_DURING_DEPLOYMENT: false

      - name: 'Wait for deployment to stabilize'
        run: |
          echo "Waiting 45 seconds for app to start..."
          sleep 45

      - name: 'Health Check - Verify Staging Deployment'
        id: health-check
        run: |
          MAX_RETRIES=5
          RETRY_DELAY=15
          # Frontend staging URL (direct access, no Front Door)
          HEALTH_URL="https://backfolio-frontend-staging-brb5fjfdaufydfez.canadacentral-01.azurewebsites.net/health"
          
          echo "Checking frontend at: $HEALTH_URL"
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."
            
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" --max-time 30 || echo "000")
            
            # Success if 2xx or 3xx (app is serving content)
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
              echo "✅ Health check passed! Status: $HTTP_STATUS"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "⚠️ Health check failed. Status: $HTTP_STATUS (5xx or connection error)"
              if [ $i -lt $MAX_RETRIES ]; then
                echo "Retrying in $RETRY_DELAY seconds..."
                sleep $RETRY_DELAY
              fi
            fi
          done
          
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          echo "healthy=false" >> $GITHUB_OUTPUT
          exit 1

      - name: 'Alert on Health Check Failure'
        if: failure() && steps.health-check.outcome == 'failure'
        run: |
          echo "❌ DEPLOYMENT FAILED - STAGING IS UNHEALTHY ❌"
          echo ""
          echo "⚠️  DO NOT SWAP TO PRODUCTION - staging has broken code!"
          echo ""
          echo "To fix:"
          echo "1. Check the deployment logs for errors"
          echo "2. Fix the code and push a new commit"
          echo "3. Or manually redeploy the last working version"
          echo ""
          echo "Staging URL: https://backfolio-frontend-staging-brb5fjfdaufydfez.canadacentral-01.azurewebsites.net/"
          
          exit 1

  swap-to-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      id-token: write
      contents: read
    environment:
      name: production
      url: https://backfolio-frontend-ayh5hnewazg6fph4.canadacentral-01.azurewebsites.net

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging to production
        run: |
          az webapp deployment slot swap \
            --name backfolio-frontend \
            --resource-group backfolio-fe-rg \
            --slot staging \
            --target-slot production

      - name: Health Check - Verify Production
        run: |
          echo "Waiting 15 seconds for swap to complete..."
          sleep 15
          
          HEALTH_URL="https://backfolio-frontend-ayh5hnewazg6fph4.canadacentral-01.azurewebsites.net/health"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" --max-time 30 || echo "000")
          
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Production is healthy! Status: $HTTP_STATUS"
          else
            echo "⚠️ Production health check returned: $HTTP_STATUS"
            echo "This may be normal if DNS/SSL is still propagating"
          fi